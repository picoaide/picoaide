<div class="surface-panel" id="chat-panel" style="display:flex;flex-direction:column">
  <!-- 工具栏 -->
  <div class="toolbar" style="padding:.85rem 1rem;border-bottom:1px solid var(--border-light);flex-shrink:0">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%">
      <div>
        <div class="toolbar-title" style="font-size:1.05rem">AI 对话</div>
        <div class="toolbar-subtitle">与你的 AI 助手对话</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div id="chat-context-bar" style="display:none;min-width:160px;max-width:220px;padding-top:2px">
          <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary,#999);margin-bottom:2px">
            <span>上下文</span>
            <span id="chat-context-label">0%</span>
          </div>
          <div style="height:4px;background:#e8e8e8;border-radius:2px;overflow:hidden">
            <div id="chat-context-fill" style="width:0%;height:100%;background:#4a9eff;border-radius:2px;transition:width .3s ease"></div>
          </div>
        </div>
        <button type="button" class="btn btn-sm btn-outline" id="chat-pause-btn" style="display:none">⏸ 暂停</button>
        <button type="button" class="btn btn-sm btn-outline" id="chat-cancel-btn" style="display:none">⏹ 取消</button>
      </div>
    </div>
  </div>

  <!-- 双栏主体 -->
  <div style="flex:1;display:flex;min-height:0">
    <!-- 左侧：任务面板（320px） -->
    <div id="task-panel" style="width:320px;border-right:1px solid var(--border-light);overflow-y:auto;flex-shrink:0;background:var(--card-bg,#fff)">
      <div class="task-panel-section">
        <div class="task-panel-title">当前任务</div>
        <div id="current-task"><div class="task-item" style="color:var(--text-secondary);font-style:italic">暂无</div></div>
      </div>
      <div class="task-panel-section">
        <div class="task-panel-title">队列</div>
        <div id="task-queue"><div class="task-item" style="color:var(--text-secondary);font-style:italic">暂无</div></div>
      </div>
      <div class="task-panel-section">
        <div class="task-panel-title">历史</div>
        <div id="task-history"><div class="task-item" style="color:var(--text-secondary);font-style:italic">暂无</div></div>
      </div>
    </div>

    <!-- 右侧：对话区域 -->
    <div style="flex:1;display:flex;flex-direction:column;min-width:0">
      <div id="chat-box" style="flex:1;overflow-y:auto;padding:1rem;min-height:0;position:relative">
        <div id="chat-loading" class="chat-skeleton">
          <div class="skeleton-line" style="width:75%"></div>
          <div class="skeleton-line" style="width:50%"></div>
          <div class="skeleton-line" style="width:60%"></div>
        </div>
        <div id="chat-timeout-hint" style="display:none;padding:8px 14px;font-size:13px;color:#e67e22;background:#fef9e7;border:1px solid #f9e79f;border-radius:8px;margin-bottom:8px;text-align:center">⏳ 响应时间较长，请稍候...</div>
        <button id="chat-scroll-bottom" style="display:none;position:sticky;bottom:8px;left:50%;transform:translateX(-50%);z-index:10;padding:6px 14px;border:1px solid #d0d0d0;border-radius:16px;background:#fff;color:#4a9eff;font-size:13px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.1);white-space:nowrap">⬇ 新消息</button>
      </div>
      <div style="padding:.75rem 1rem;border-top:1px solid var(--border-light);flex-shrink:0;background:var(--card-bg,#fff)">
        <form id="chat-form" style="display:flex;gap:.5rem;align-items:flex-end">
          <textarea id="chat-input" rows="1"
            placeholder="输入消息...（Shift+Enter 换行）"
            style="flex:1;padding:.6rem .8rem;border:1px solid var(--border,#d0d0d0);border-radius:6px;font-size:.93rem;outline:none;resize:none;line-height:1.5;min-height:38px;max-height:200px;overflow-y:auto"></textarea>
          <button type="submit" class="btn btn-primary" id="chat-send-btn" style="padding:.6rem 1.2rem;flex-shrink:0">发送</button>
          <button type="button" class="btn btn-danger" id="chat-stop-btn" style="padding:.6rem 1.2rem;display:none;flex-shrink:0" disabled>停止</button>
        </form>
      </div>
    </div>
  </div>
</div>

<style>
.chat-msg{margin-bottom:12px;padding:10px 14px;border-radius:8px;max-width:85%;min-width:0;word-break:break-word;overflow-wrap:break-word}
.chat-msg.msg-user{background:#e3f2fd;margin-left:auto}
.chat-msg.msg-assistant{background:var(--card-bg,#fff);border:1px solid var(--border-light,#e0e0e0)}
.chat-meta{font-size:12px;color:var(--text-secondary,#999);margin-bottom:4px}
.chat-content{line-height:1.6;font-size:.93rem;min-width:0}
.chat-content p{margin:0 0 6px}
.chat-content p:last-child{margin:0}
.chat-content h2,.chat-content h3,.chat-content h4{margin:10px 0 4px;font-weight:600}
.chat-content h2{font-size:1.05rem}
.chat-content h3{font-size:1rem}
.chat-content h4{font-size:.95rem}
.chat-content ul,.chat-content ol{margin:4px 0 8px;padding-left:20px}
.chat-content li{margin:2px 0}
.chat-content blockquote{margin:6px 0;padding:4px 12px;border-left:3px solid #4a9eff;color:var(--text-secondary,#666);background:#f8f9fa;border-radius:0 4px 4px 0}
.chat-content hr{border:none;border-top:1px solid var(--border-light,#e0e0e0);margin:12px 0}
.chat-content a{color:#4a9eff;text-decoration:underline}
.chat-content table{border-collapse:collapse;margin:8px 0;max-width:100%;overflow-x:auto;display:block;font-size:.88em}
.chat-content th,.chat-content td{border:1px solid #ddd;padding:6px 10px;text-align:left}
.chat-content th{background:#f5f5f5;font-weight:600}
.chat-content tr:nth-child(even){background:#fafafa}
.chat-content code{background:#f0f0f0;padding:1px 4px;border-radius:3px;font-size:.88em;word-break:break-word}
.chat-content pre{background:#f5f5f5;padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0;max-width:100%}
.chat-content pre code{background:none;padding:0;word-break:normal}
.chat-thinking-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--text-secondary,#999);animation:chatPulse 1.2s infinite}
@keyframes chatPulse{0%,100%{opacity:.3}50%{opacity:1}}
.chat-skeleton{padding:20px}
.reasoning-collapsed{display:none}
.msg-reasoning .reasoning-header:hover{background:#f0f0f0}
.skeleton-line{height:14px;background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:skeletonShine 1.5s infinite;border-radius:4px;margin-bottom:12px}
@keyframes skeletonShine{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* 任务面板样式 */
.task-panel-section{padding:.75rem;border-bottom:1px solid var(--border-light)}
.task-panel-title{font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.task-item{padding:8px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;font-size:13px;transition:background .15s}
.task-item:hover{background:var(--hover-bg,#f5f5f5)}
.task-item.active{background:#e3f2fd;border-left:3px solid #4a9eff}
.task-item .task-status{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;vertical-align:middle}
.task-item .task-status.running{background:#27ae60;animation:pulse 1.5s infinite}
.task-item .task-status.paused{background:#f39c12}
.task-item .task-status.completed{background:#95a5a6}
.task-item .task-status.failed{background:#e74c3c}
.task-item .task-status.cancelled{background:#95a5a6}
.task-item .task-status.pending{background:#bdc3c7}
.task-item .task-title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.task-item .task-meta{font-size:11px;color:var(--text-secondary);margin-top:2px}

/* 全局 daemon 状态栏 */
#daemon-status-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:var(--card-bg);border-top:1px solid var(--border-light);font-size:12px;color:var(--text-secondary);flex-shrink:0}
#daemon-status-bar .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.status-dot.running{background:#27ae60;animation:pulse 1.5s infinite}
.status-dot.stopped{background:#95a5a6}
.status-dot.error{background:#e74c3c}
</style>
