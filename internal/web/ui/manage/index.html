<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PicoAide 配置管理</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div id="manage-layout">
    <nav class="navbar">
      <h1><img class="brand-mark" src="../images/logo-mark.svg" alt="">PicoAide 配置管理</h1>
      <div class="navbar-right">
        <span id="user-display"></span>
        <button class="btn btn-sm btn-outline" id="logout-btn">退出</button>
      </div>
    </nav>

    <main class="container">
      <section class="page-header">
        <div>
          <div class="page-kicker">个人工作区</div>
          <h2>配置管理</h2>
          <p>管理你的 AI 运行配置、授权文件和本地账号密码。超管仅进入管理后台，不参与普通用户配置。</p>
        </div>
      </section>

      <nav class="tabs" id="manage-nav">
        <a href="/user/welcome" class="tab" data-section="welcome">首页</a>
        <a href="/user/chat" class="tab" data-section="chat">对话</a>
        <a href="/user/skills" class="tab" data-section="skills">技能中心</a>
        <a href="/user/channels" class="tab" data-section="channels">通讯渠道</a>
        <a href="/user/email" class="tab" data-section="email">邮箱</a>
        <a href="/user/files" class="tab" data-section="files">文件管理</a>
        <a href="/user/teamspace" class="tab" data-section="teamspace">团队空间</a>
        <a href="/user/authorization" class="tab" data-section="authorization">AI 授权</a>
        <a href="/user/cron" class="tab" data-section="cron">定时任务</a>
        <a href="/user/password" class="tab" data-section="password" id="tab-password-btn">修改密码</a>
      </nav>

      <div id="content-area"></div>
    </main>

    <!-- 全局 daemon 状态栏 → 所有页面可见 -->
    <div id="daemon-status-bar" style="position:fixed;bottom:0;left:0;right:0;z-index:100">
      <span class="status-dot stopped" id="daemon-dot"></span>
      <span id="daemon-text">Agent 未运行</span>
      <span style="flex:1"></span>
      <span id="daemon-queue-badge" style="display:none"></span>
      <button class="btn btn-sm btn-outline" id="daemon-restart-btn" style="display:none" onclick="restartDaemon()">重启 Agent</button>
    </div>
  </div>

  <script src="../js/common.js"></script>
  <script src="manage.js" type="module"></script>
</body>
</html>
