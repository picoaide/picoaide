<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PicoAide 配置管理</title>
  <link rel="stylesheet" href="css/common.css">
</head>
<body>
  <div id="manage-page">
    <nav class="navbar">
      <h1><img class="brand-mark" src="images/logo-mark.svg" alt="">PicoAide 配置管理</h1>
      <div class="navbar-right">
        <span id="user-display"></span>
        <button class="btn btn-sm btn-outline" id="logout-btn">退出</button>
      </div>
    </nav>

    <main class="container">
      <section class="page-header">
        <div>
          <div class="page-kicker">个人工作区</div>
          <h2>配置管理</h2>
          <p>管理你的 AI 运行配置、授权文件和本地账号密码。超管仅进入管理后台，不参与普通用户配置。</p>
        </div>
      </section>

      <div class="tabs">
        <button class="tab active" data-tab="channels">通讯渠道</button>
        <button class="tab" data-tab="files">文件管理</button>
        <button class="tab" data-tab="teamspace">团队空间</button>
        <button class="tab" data-tab="password" id="tab-password-btn">修改密码</button>
      </div>

      <div id="tab-channels" class="panel active">
        <div class="surface-panel split-panel">
          <aside class="split-sidebar">
            <div class="toolbar" style="margin-bottom:.6rem">
              <div>
                <div class="toolbar-title">通讯渠道</div>
                <div class="toolbar-subtitle">选择一个渠道后维护配置</div>
              </div>
            </div>
            <div id="channel-list" class="nav-list"></div>
          </aside>
          <section class="split-main">
            <div class="toolbar">
              <div>
                <div class="toolbar-title" id="channel-title">渠道配置</div>
                <div class="toolbar-subtitle" id="channel-subtitle">保存后会重启你的容器</div>
              </div>
              <button class="btn btn-primary" id="channel-save-btn">保存并重启容器</button>
            </div>
            <div id="channel-fields"></div>
            <div id="channel-msg" class="msg"></div>
          </section>
        </div>
      </div>

      <div id="tab-files" class="panel">
        <div class="card">
          <div class="card-header">文件管理</div>
          <nav id="breadcrumb" class="text-sm mb-1"></nav>
          <div class="toolbar">
            <button class="btn btn-sm btn-outline" id="mkdir-btn">新建目录</button>
            <div class="inline-file" style="flex:1;max-width:560px">
              <div class="file-summary" id="upload-file-name">未选择文件</div>
              <div class="btn-group">
                <label class="btn btn-sm btn-outline" style="cursor:pointer">选择文件<input type="file" id="upload-input" class="hidden"></label>
                <button class="btn btn-sm btn-primary" id="upload-btn" disabled>上传到当前目录</button>
              </div>
            </div>
          </div>
          <div id="file-list"></div>
          <div id="file-msg" class="msg"></div>
        </div>
      </div>

      <div id="tab-teamspace" class="panel">
        <div class="card">
          <div class="card-header">团队空间</div>
          <p class="text-muted mb-1">共享文件夹挂载在容器内的 <code>workspace/share/&lt;名称&gt;/</code> 目录下，AI 助手可以直接读写这些文件以实现团队协作。</p>
          <div id="ts-list"></div>
          <div id="ts-msg" class="msg"></div>
        </div>
      </div>

      <div id="tab-password" class="panel">
        <div class="card">
          <div class="card-header">修改密码</div>
          <div id="password-unified-tip" class="msg msg-info hidden">非本地用户不支持修改密码，请联系管理员在公司认证中心修改。</div>
          <div id="password-form">
            <div class="field"><label>旧密码</label><input type="password" id="old-password"></div>
            <div class="field"><label>新密码</label><input type="password" id="new-password" placeholder="至少 6 个字符"></div>
            <div class="field"><label>确认新密码</label><input type="password" id="confirm-password"></div>
            <div id="password-msg" class="msg"></div>
            <button class="btn btn-primary" id="change-password-btn">修改密码</button>
          </div>
        </div>
      </div>

      <div id="tab-editor" class="panel">
        <div class="card">
          <div class="row mb-1">
            <button class="btn btn-outline" id="editor-back">返回</button>
            <strong id="editor-filename" style="flex:1"></strong>
            <button class="btn btn-primary" id="editor-save">保存</button>
          </div>
          <div id="editor-msg" class="msg"></div>
          <textarea id="editor-content" spellcheck="false" style="font-family:monospace;height:480px"></textarea>
        </div>
      </div>
    </main>
  </div>

  <script src="js/common.js"></script>
  <script src="manage.js"></script>
</body>
</html>
