<section class="page-header">
  <div>
    <div class="page-kicker">身份与访问</div>
    <h2>认证配置</h2>
    <p>统一管理本地超管、企业统一登录、白名单和用户组同步策略。</p>
  </div>
  <button class="btn btn-primary btn-sm" id="save-auth-config-btn">保存全部认证配置</button>
</section>
<div id="auth-msg" class="msg"></div>

<div class="card">
  <div class="card-header">认证模式</div>
  <div class="field">
    <label>认证方式</label>
    <select id="auth-mode"></select>
  </div>
  <div id="provider-mode-notice" class="msg msg-info hidden">统一认证模式下，本地普通用户被禁用，仅超管可使用本地密码登录。切换认证方式会清空当前普通用户、容器记录、用户目录和归档目录。</div>
</div>

<div id="provider-config-container"></div>

<div id="auth-whitelist-section">
  <div class="card">
    <div class="card-header">白名单</div>
    <div class="grid-2">
      <div class="field">
        <label>启用白名单</label>
        <select id="wl-enabled">
          <option value="false">关闭（所有外部用户均可使用）</option>
          <option value="true">开启（仅白名单内用户可使用）</option>
        </select>
      </div>
    </div>
    <p class="text-sm text-muted">白名单只作用于当前统一认证方式。关闭后不限制外部用户登录。</p>
  </div>

  <div id="wl-section" class="card hidden">
    <div class="card-header">白名单用户</div>
    <div id="wl-tags" class="mt-1"></div>
    <div id="wl-msg" class="msg"></div>
    <div id="wl-search-row" class="row mt-1">
      <input type="text" id="wl-search-input" placeholder="搜索 LDAP 用户...">
      <button class="btn btn-outline btn-sm" id="wl-search-btn">搜索</button>
    </div>
    <div id="wl-search-results" class="mt-1 hidden"></div>
    <div class="row mt-1">
      <input type="text" id="wl-add-input" placeholder="手动输入用户名">
      <button class="btn btn-primary btn-sm" id="wl-add-btn">添加</button>
    </div>
  </div>
</div>

<div class="row mt-1">
  <button class="btn btn-primary btn-sm" id="save-auth-config-bottom-btn">保存全部认证配置</button>
</div>
