<section class="page-header">
  <div>
    <div class="page-kicker">身份与访问</div>
    <h2>认证配置</h2>
    <p>统一管理本地超管、LDAP 登录、白名单和用户组同步策略。</p>
  </div>
</section>
<div id="auth-msg" class="msg"></div>

<div class="card">
  <div class="card-header">认证模式</div>
  <div class="field">
    <label>认证方式</label>
    <select id="auth-mode">
      <option value="local">本地认证</option>
      <option value="ldap">LDAP 统一登录</option>
    </select>
  </div>
  <div id="ldap-mode-notice" class="msg msg-info hidden">LDAP 模式下，本地用户（非超管）将被禁用，仅超管可使用本地密码登录。</div>
  <div class="field">
    <label>Session 密钥</label>
    <input type="password" id="session-secret" placeholder="change-me-to-a-random-secret">
  </div>
  <button class="btn btn-primary btn-sm" id="save-auth-btn">保存认证配置</button>
</div>

<div id="ldap-section">
  <div class="card">
    <div class="card-header">LDAP 配置</div>
    <div class="grid-2">
      <div class="field"><label>LDAP 地址</label><input type="text" id="ldap-host" placeholder="ldap://ldap.example.com:389"></div>
      <div class="field"><label>Bind DN</label><input type="text" id="ldap-bind-dn" placeholder="cn=admin,dc=example,dc=com"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Bind Password</label><input type="password" id="ldap-bind-password"></div>
      <div class="field"><label>Base DN</label><input type="text" id="ldap-base-dn" placeholder="ou=users,dc=example,dc=com"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>Filter</label><input type="text" id="ldap-filter" placeholder="(objectClass=inetOrgPerson)"></div>
      <div class="field"><label>Username Attribute</label><input type="text" id="ldap-username-attr" placeholder="uid"></div>
    </div>
    <div class="row mt-1">
      <button class="btn btn-outline btn-sm" id="test-ldap-btn">测试连接</button>
      <button class="btn btn-primary btn-sm" id="save-ldap-btn">保存 LDAP 配置</button>
    </div>
    <div id="ldap-test-result" class="mt-1 hidden" style="font-size:0.9em"></div>
  </div>

  <div class="card">
    <div class="card-header">LDAP 组配置</div>
    <div class="grid-2">
      <div class="field">
        <label>组搜索方式</label>
        <select id="ldap-group-mode">
          <option value="">不启用组同步</option>
          <option value="member_of">memberOf（AD 风格）</option>
          <option value="group_search">groupOfNames（OpenLDAP 风格）</option>
        </select>
      </div>
      <div class="field"><label>组 Base DN</label><input type="text" id="ldap-group-base-dn" placeholder="留空使用用户 Base DN"></div>
    </div>
    <div class="grid-2">
      <div class="field"><label>组过滤条件</label><input type="text" id="ldap-group-filter" placeholder="(objectClass=groupOfNames)"></div>
      <div class="field"><label>组成员属性</label><input type="text" id="ldap-group-member-attr" placeholder="member"></div>
    </div>
    <div class="row mt-1">
      <button class="btn btn-outline btn-sm" id="sync-groups-btn">同步 LDAP 组</button>
      <button class="btn btn-primary btn-sm" id="save-group-config-btn">保存组配置</button>
    </div>
    <div id="sync-groups-msg" class="msg"></div>
  </div>

  <div class="card">
    <div class="card-header">白名单与同步</div>
    <div class="grid-2">
      <div class="field">
        <label>启用白名单</label>
        <select id="wl-enabled">
          <option value="false">关闭（所有 LDAP 用户均可使用）</option>
          <option value="true">开启（仅白名单内用户可使用）</option>
        </select>
      </div>
      <div class="field">
        <label>自动同步间隔</label>
        <select id="sync-interval">
          <option value="0">禁用</option>
          <option value="30m">每 30 分钟</option>
          <option value="1h">每 1 小时</option>
          <option value="24h" selected>每天</option>
          <option value="168h">每周</option>
        </select>
      </div>
    </div>
    <p class="text-sm text-muted">自动同步会在后台定期从 LDAP 同步组数据，修改后需保存配置并重启服务生效。</p>
    <button class="btn btn-primary btn-sm" id="save-sync-btn">保存同步配置</button>
  </div>

  <div id="wl-section" class="card hidden">
    <div class="card-header">白名单用户</div>
    <div id="wl-tags" class="mt-1"></div>
    <div id="wl-msg" class="msg"></div>
    <div class="row mt-1">
      <input type="text" id="wl-search-input" placeholder="搜索 LDAP 用户...">
      <button class="btn btn-outline btn-sm" id="wl-search-btn">搜索</button>
    </div>
    <div id="wl-search-results" class="mt-1 hidden"></div>
    <div class="row mt-1">
      <input type="text" id="wl-add-input" placeholder="手动输入用户名">
      <button class="btn btn-primary btn-sm" id="wl-add-btn">添加</button>
    </div>
  </div>
</div>
