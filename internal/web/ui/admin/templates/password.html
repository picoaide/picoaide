<section class="page-header">
  <div>
    <div class="page-kicker">账户安全</div>
    <h2>修改密码</h2>
    <p>修改当前超管账户的登录密码。</p>
  </div>
</section>
<div class="card" style="max-width:480px">
  <div class="card-body">
    <div class="field">
      <label>旧密码</label>
      <input type="password" id="old-password" class="input" autocomplete="current-password">
    </div>
    <div class="field">
      <label>新密码</label>
      <input type="password" id="new-password" class="input" placeholder="至少 6 个字符" autocomplete="new-password">
    </div>
    <div class="field">
      <label>确认新密码</label>
      <input type="password" id="confirm-password" class="input" autocomplete="new-password">
    </div>
    <div id="password-msg" class="msg"></div>
    <button class="btn btn-primary" id="change-password-btn">修改密码</button>
  </div>
</div>
