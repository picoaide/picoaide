<section class="page-header">
  <div>
    <div class="page-kicker">用户工作区</div>
    <h2>用户管理</h2>
    <p>普通用户拥有独立容器、目录和配置边界，管理员负责生命周期治理。</p>
  </div>
  <div class="page-actions">
    <button class="btn btn-primary btn-sm hidden" id="new-user-btn">新建用户</button>
    <button class="btn btn-outline btn-sm" id="refresh-users">刷新</button>
  </div>
</section>

<div id="unified-auth-tip" class="msg msg-info hidden">统一认证模式下，用户由外部认证系统管理，不支持手动添加。</div>

<div class="list-controls">
  <div class="list-search">
    <input type="search" id="users-search" placeholder="搜索用户名、来源或角色">
    <button class="btn btn-outline btn-sm" id="users-search-btn">搜索</button>
  </div>
</div>

<div class="table-wrap">
  <table class="wide-table">
    <thead><tr><th>用户名</th><th>来源</th><th>组</th><th>容器状态</th><th>镜像版本</th><th>IP</th><th class="actions-cell">操作</th></tr></thead>
    <tbody id="users-tbody"></tbody>
  </table>
</div>
<div class="pager" id="users-pager">
  <span class="pager-info" id="users-page-info"></span>
  <select id="users-page-size">
    <option value="20">20 / 页</option>
    <option value="50">50 / 页</option>
    <option value="100">100 / 页</option>
  </select>
  <button class="btn btn-outline btn-sm" id="users-prev">上一页</button>
  <button class="btn btn-outline btn-sm" id="users-next">下一页</button>
</div>
<p id="users-empty" class="text-muted text-center mt-1 hidden">暂无用户</p>
<div id="users-msg" class="msg"></div>
