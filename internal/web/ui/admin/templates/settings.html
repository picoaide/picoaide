<section class="page-header">
  <div>
    <div class="page-kicker">平台配置</div>
    <h2>系统配置</h2>
    <p>集中维护平台配置项。</p>
  </div>
</section>
<div id="settings-msg" class="msg"></div>

<div class="card">
  <div class="card-header">目录配置</div>
  <div class="grid-2">
    <div class="field"><label>用户目录</label><input type="text" data-path="users_root" placeholder="./users"></div>
    <div class="field"><label>归档目录</label><input type="text" data-path="archive_root" placeholder="./archive"></div>
  </div>
</div>

<div class="card">
  <div class="card-header">Web 服务</div>
  <p class="text-sm text-muted">HTTPS 证书配置已移至 <a href="/admin/tls">证书配置</a> 页面。</p>
  <div class="field" style="margin-top:12px">
    <label>调试模式</label>
    <label class="toggle-switch">
      <input type="checkbox" id="debug-mode-toggle">
      <span class="toggle-switch-control"></span>
    </label>
  </div>
  <p class="text-sm text-muted" style="margin-top:8px">开启后记录所有操作到 <code>logs/debug.log</code>，包括 Agent 请求/响应、Token 用量、工具调用、沙箱生命周期等。仅用于排查问题，日常请关闭。</p>
</div>

<div class="card">
  <div class="card-header">技能安装策略</div>
  <div class="field">
    <label>允许用户从三方市场安装技能</label>
    <label class="toggle-switch">
      <input type="checkbox" id="skill-install-toggle">
      <span class="toggle-switch-control"></span>
    </label>
  </div>
  <p class="text-sm text-muted" style="margin-top:8px" id="skill-policy-desc">关闭时，用户仅可通过 PicoAide 技能中心安装技能；开启后，用户还可通过 AI 助手从 ClawHub、GitHub 等三方市场自行搜索和安装。</p>
</div>

<div class="btn-group mt-2" style="justify-content:flex-end">
  <button class="btn btn-ghost" id="reset-btn">重置</button>
  <button class="btn btn-primary" id="save-btn">保存配置</button>
</div>
