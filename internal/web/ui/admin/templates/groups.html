<section class="page-header">
  <div>
    <div class="page-kicker">组织策略</div>
    <h2>用户组</h2>
    <p>用户组来自当前认证源，可用于绑定 Skill、下发配置和管理容器策略。</p>
  </div>
  <div class="page-actions">
    <button class="btn btn-outline btn-sm" id="refresh-groups">刷新</button>
  </div>
</section>

<div class="msg msg-info">用户组和成员由当前认证源同步，不支持手动新建、删除或编辑成员。</div>

<div class="list-controls">
  <div class="list-search">
    <input type="search" id="groups-search" placeholder="搜索组名、来源或描述">
    <button class="btn btn-outline btn-sm" id="groups-search-btn">搜索</button>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead><tr><th>组名</th><th>来源</th><th>成员数</th><th>绑定技能</th><th class="actions-cell">操作</th></tr></thead>
    <tbody id="groups-tbody"></tbody>
  </table>
</div>
<div class="pager" id="groups-pager">
  <span class="pager-info" id="groups-page-info"></span>
  <select id="groups-page-size">
    <option value="50">50 / 页</option>
    <option value="100">100 / 页</option>
    <option value="200">200 / 页</option>
  </select>
  <button class="btn btn-outline btn-sm" id="groups-prev">上一页</button>
  <button class="btn btn-outline btn-sm" id="groups-next">下一页</button>
</div>
<p id="groups-empty" class="text-muted text-center mt-1 hidden">暂无用户组</p>
<div id="groups-msg" class="msg"></div>
