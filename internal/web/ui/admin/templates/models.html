<section class="page-header">
  <div>
    <h2>模型配置</h2>
    <p>配置 PicoAgent 使用的 AI 模型。</p>
  </div>
</section>
<div id="models-msg" class="msg"></div>

<div class="card">
  <div class="card-header">模型参数</div>
  <div class="grid-2">
    <div class="field"><label>供应商</label><select id="model-provider"><option value="openai">OpenAI</option><option value="anthropic">Anthropic</option><option value="deepseek">DeepSeek</option><option value="qwen">通义千问</option><option value="volcengine">火山引擎</option><option value="zhipu">智谱</option><option value="groq">Groq</option><option value="moonshot">Moonshot</option><option value="openrouter">OpenRouter</option><option value="custom">自定义</option></select></div>
    <div class="field"><label>模型 ID</label><input type="text" id="model-model-id" placeholder="如 gpt-4o, claude-sonnet-4"></div>
  </div>
  <div class="grid-3">
    <div class="field"><label>API Base URL</label><input type="text" id="model-base-url" placeholder="留空使用默认值"></div>
    <div class="field"><label>API 密钥</label><input type="password" id="model-api-key" placeholder="sk-..."></div>
    <div class="field"><label>请求超时（秒）</label><input type="number" id="model-request-timeout" placeholder="600"></div>
  </div>
  <div class="grid-3">
    <div class="field"><label>上下文长度</label><input type="number" id="model-context-window" placeholder="200000"></div>
    <div class="field"><label>Temperature</label><input type="text" id="model-temperature" placeholder="0.7"></div>
    <div class="field"><label>最大推理步数</label><input type="number" id="model-max-iter" placeholder="500"></div>
  </div>
  <div class="grid-3">
    <div class="field"><label>最大输出 Token（0=不限制）</label><input type="number" id="model-max-tokens" placeholder="0"></div>
  </div>
</div>

<div class="btn-group mt-2" style="justify-content:flex-end">
  <button class="btn btn-ghost" id="models-reset-btn">重置</button>
  <button class="btn btn-outline" id="models-test-btn">测试连接</button>
  <button class="btn btn-primary" id="models-save-btn">保存模型配置</button>
</div>
