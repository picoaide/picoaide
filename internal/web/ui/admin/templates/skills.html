<section class="page-header">
  <div>
    <div class="page-kicker">企业统一管理 Skill</div>
    <h2>技能库</h2>
    <p>统一安装、部署和回收企业 Skill，通过用户组将标准能力包交付给目标人群。</p>
  </div>
</section>

<h3>已安装技能</h3>
<div class="list-controls">
  <div class="list-search">
    <input type="search" id="skills-search" placeholder="搜索技能名称">
    <button class="btn btn-outline btn-sm" id="skills-search-btn">搜索</button>
  </div>
</div>
<div class="table-wrap">
  <table>
    <thead><tr><th>技能名称</th><th>文件数</th><th>大小</th><th>更新时间</th><th class="actions-cell">操作</th></tr></thead>
    <tbody id="skills-tbody"></tbody>
  </table>
</div>
<div class="pager" id="skills-pager">
  <span class="pager-info" id="skills-page-info"></span>
  <select id="skills-page-size">
    <option value="50">50 / 页</option>
    <option value="100">100 / 页</option>
    <option value="200">200 / 页</option>
  </select>
  <button class="btn btn-outline btn-sm" id="skills-prev">上一页</button>
  <button class="btn btn-outline btn-sm" id="skills-next">下一页</button>
</div>
<p id="skills-empty" class="text-muted text-center mt-1 hidden">暂无已安装技能</p>
<div id="skills-msg" class="msg"></div>

<h3>部署技能</h3>
<div class="surface-panel">
  <div class="surface-panel-body">
    <div class="toolbar">
      <div>
        <div class="toolbar-title">部署目标</div>
        <div class="toolbar-subtitle">先选择技能和范围，再执行部署</div>
      </div>
      <button class="btn btn-primary" id="deploy-btn">部署</button>
    </div>
    <div class="grid-2">
      <div class="field">
        <label>技能</label>
        <select id="deploy-skill"><option value="">所有技能</option></select>
      </div>
      <div class="field">
        <label>目标类型</label>
        <select id="deploy-target-type">
          <option value="all">所有用户</option>
          <option value="user">按用户</option>
          <option value="group">按组</option>
        </select>
      </div>
      <div class="field">
        <label>搜索目标</label>
        <div class="row">
          <input type="search" id="deploy-target-search" placeholder="输入用户名或组名" style="flex:1">
          <button class="btn btn-sm btn-outline" id="deploy-target-search-btn">搜索</button>
        </div>
        <select id="deploy-target">
          <option value="all">所有用户</option>
        </select>
      </div>
    </div>
  </div>
</div>
<div id="deploy-msg" class="msg"></div>

<hr>

<h3>添加技能</h3>
<div class="surface-panel">
  <div class="surface-panel-body">
    <div class="segmented mb-1">
      <button class="segment active" data-skill-source="zip" type="button">Zip 压缩包</button>
      <button class="segment" data-skill-source="git" type="button">Git 地址</button>
    </div>
    <input type="hidden" id="skill-source" value="zip">
    <div class="field"><label>技能名称</label><input type="text" id="skill-name" placeholder="my-skill"></div>
    <div id="skill-source-zip">
      <div class="inline-file">
        <div class="file-summary" id="skill-upload-file-name">未选择 zip 文件</div>
        <label class="btn btn-sm btn-outline" style="cursor:pointer">选择 zip<input type="file" id="skill-upload-file" accept=".zip,application/zip" class="hidden"></label>
      </div>
      <p class="text-sm text-muted mt-1">压缩包可以包含一个顶层目录，上传后会安装为上方填写的技能名称。重复导入同名技能会覆盖旧内容。</p>
    </div>
    <div id="skill-source-git" class="hidden">
      <div class="field"><label>Git 地址</label><input type="text" id="repo-url" placeholder="https://github.com/org/repo.git"></div>
      <div class="grid-2">
        <div class="field"><label>分支 / Tag</label><div class="row">
          <select id="repo-ref-type" style="min-width:120px">
            <option value="branch">分支</option>
            <option value="tag">Tag</option>
          </select>
          <input type="text" id="repo-ref" placeholder="main / v1.2.3" style="flex:1">
        </div></div>
        <div class="field"><label>凭据</label>
          <label class="toggle-switch toggle-switch-field">
            <input type="checkbox" id="repo-use-credentials">
            <span class="toggle-switch-control" aria-hidden="true"></span>
            <span class="toggle-switch-label">添加凭据</span>
          </label>
        </div>
      </div>
      <div id="repo-new-credentials" class="hidden">
        <div class="row" style="justify-content:space-between;align-items:center;margin-bottom:.5rem">
          <strong>凭据</strong>
          <button class="btn btn-sm btn-outline" id="repo-new-add-cred">+ 添加凭据</button>
        </div>
        <div id="repo-new-cred-list"></div>
      </div>
      <p class="text-sm text-muted">不添加凭据时按公开仓库克隆。凭据方式会根据 Git 地址自动判断。</p>
    </div>
    <div class="card-footer">
      <button class="btn btn-primary" id="skill-add-btn">导入技能</button>
    </div>
  </div>
</div>
<div id="repo-msg" class="msg"></div>

<h3>Git 技能更新</h3>
<div id="repos-list"></div>
