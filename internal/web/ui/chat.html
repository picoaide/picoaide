<!DOCTYPE html>
<html lang="zh-CN">
<head><meta charset="UTF-8"><title>对话历史 - PicoAgent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#f5f5f5;height:100vh;display:flex;flex-direction:column}
.header{background:#fff;padding:16px 24px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px}
#chatBox{flex:1;overflow-y:auto;padding:16px 24px;max-width:800px;margin:0 auto;width:100%}
.msg{margin-bottom:16px;padding:12px 16px;border-radius:8px;max-width:80%}
.msg.user{background:#e3f2fd;margin-left:auto}
.msg.assistant{background:#fff;border:1px solid #e0e0e0}
.msg .meta{font-size:12px;color:#999;margin-bottom:4px}
.msg .content{white-space:pre-wrap;line-height:1.6}
.empty{text-align:center;color:#999;margin-top:40px}
#loading{text-align:center;padding:20px;color:#666}
</style>
</head>
<body>
<div class="header">
  <h1>对话历史</h1>
  <button onclick="location.href='/user'">返回</button>
</div>
<div id="chatBox"><div id="loading">加载中...</div></div>
<script>
async function loadHistory() {
  const res = await fetch('/api/user/chat/history');
  const data = await res.json();
  const box = document.getElementById('chatBox');
  box.innerHTML = '';
  if (!data.messages || data.messages.length === 0) {
    box.innerHTML = '<div class="empty">暂无对话记录</div>';
    return;
  }
  data.messages.forEach(m => {
    const div = document.createElement('div');
    div.className = 'msg ' + (m.role === 'user' ? 'user' : 'assistant');
    div.innerHTML = `<div class="meta">${m.role === 'user' ? '你' : '助手'}</div><div class="content">${escapeHtml(m.content || '')}</div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
loadHistory();
</script>
</body>
</html>
