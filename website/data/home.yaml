  title: 让每位员工拥有自己的 AI 操作助手
  description: AI 的力量应当被释放，但数据的边界必须被守护。PicoAide 让 AI 进入企业，而不是让数据离开企业。
  actions:
    - label: 快速开始
      href: /docs/quick-start/
      style: primary
    - label: 查看文档
      href: /docs/
      style: secondary
    - label: GitHub
      href: https://github.com/picoaide/picoaide
      style: ghost
      external: true
