signals:
  title: PicoAide Control Plane
  summary: 统一管理用户、技能、沙箱和 MCP 工具
  status: 服务在线
  boundary:
    label: 系统边界
    value: 内网部署 / 原生容器 / 组织权限继承
    description: AI 只在授权上下文中工作，数据保持在企业边界内。
  flow:
    title: 执行路径
    steps:
      - AI 沙箱 (picoagent)
      - MCP SSE 端点
      - ServiceHub 中继
      - 浏览器 / 桌面执行端
  today:
    title: 今日状态
    items:
      - 用户技能按组分发，支持 Git 仓库和注册中心
      - 浏览器授权连接可随时开启或断开
      - 桌面白名单限制文件访问范围
      - 定时任务由 Cron 调度器自动执行
