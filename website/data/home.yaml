  items:
    - number: 40
      label: MCP 工具 · 3 服务
    - number: 200+
      label: 并发沙箱节点
    - number: 审计追溯
      label: 配置变更全程记录
    - number: 零依赖
      label: 原生 Linux 内核能力，不依赖 Docker
features:
  kicker: 能力总览
  title: 围绕企业内网协作的核心能力
  summary: PicoAide 把认证、沙箱、浏览器、桌面、文件和技能统一到一个控制平面里，减少碎片化工具栈。
  items:
    - title: 原生容器隔离
      description: 每位用户拥有独立沙箱容器，基于 overlayfs + network namespace 隔离，iptables DROP 禁止容器间通信，不依赖 Docker。
    - title: 认证可插拔
      description: 使用 Provider 注册表模式，支持 Local / LDAP / OIDC。init() 自动注册，新增认证源无需修改核心代码。
    - title: MCP 三层中继
      description: SSE 与 WebSocket 组成双层中继，browser/computer 通过代理执行，agent 服务端直接处理。同时支持第三方 MCP 服务器代理。
    - title: 技能分发
      description: 技能仓库支持 Git 导入、注册中心安装和按组部署。支持默认技能设置和用户自主安装策略。
docs:
  kicker: 文档入口
  title: 按角色分层组织
  summary: 管理员线和用户线文档分开，各自覆盖完整的使用流程和最佳实践。
  items:
    - title: 快速入门
      description: 安装、初始化、systemd 服务和基础验证。
      href: /docs/quick-start/
      kicker: Start here
    - title: 架构设计
      description: 设计哲学、五大设计决策和组件关系详解。
      href: /docs/architecture/
      kicker: System design
    - title: 管理后台操作指南
      description: 用户、组、技能、认证、MCP 服务的完整管理流程。
      href: /docs/admin-guide/
      kicker: Admin
    - title: Web 面板操作指南
      description: 对话、文件、频道、定时任务和技能中心使用指南。
      href: /docs/web-panel/
      kicker: User
