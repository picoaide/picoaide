features:
  kicker: 能力总览
  title: 围绕企业内网协作的核心能力
  summary: PicoAide 把认证、容器、浏览器、桌面、文件和技能统一到一个控制平面里，减少碎片化工具栈。
  items:
    - title: 容器化隔离
      description: 每位用户拥有独立 PicoClaw 容器，基于 picoaide-net 网络隔离，容器之间默认不可直连。
    - title: 认证继承
      description: 支持本地认证与 LDAP 认证。浏览器和桌面插件复用用户身份，不需要为 AI 重新设计权限体系。
    - title: MCP 中继
      description: SSE 与 WebSocket 组成双层中继，浏览器和桌面都通过标准 MCP 工具暴露能力。
    - title: 技能分发
      description: 技能仓库支持 Git 导入、按组部署、按用户部署和上传安装，适合企业内部分层治理。
docs:
  kicker: 文档入口
  title: 按角色分层组织
  summary: 管理员线和用户线文档分开，各自覆盖完整的使用流程和最佳实践。
  items:
    - title: 快速入门
      description: 安装、初始化、systemd 服务和基础验证。
      href: /docs/quick-start/
      kicker: Start here
    - title: 架构设计
      description: 设计哲学、五大设计决策和组件关系。
      href: /docs/architecture/
      kicker: System design
    - title: 管理后台操作指南
      description: 用户、容器、镜像、技能和用户组的完整管理流程。
      href: /docs/admin-guide/
      kicker: Admin
    - title: 用户指南
      description: Web 面板、浏览器扩展、桌面客户端和 MCP 集成。
      href: /docs/web-panel/
      kicker: User
