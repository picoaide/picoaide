<!DOCTYPE html>
<html lang="zh-CN">
<head>
  {{ partial "head.html" . }}
  {{ block "head" . }}{{ end }}
</head>
<body{{ if .IsHome }} class="home"{{ end }}>
  <a href="#main" class="sr-only" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0"
     onfocus="this.style.position='fixed';this.style.width='auto';this.style.height='auto';this.style.padding='12px 24px';this.style.margin='0';this.style.clip='auto';this.style.background='#2563eb';this.style.color='#fff';this.style.zIndex='9999';this.style.fontSize='16px';this.style.textAlign='center'"
     onblur="this.style.position='absolute';this.style.width='1px';this.style.height='1px';this.style.padding='0';this.style.margin='-1px';this.style.overflow='hidden';this.style.clip='rect(0,0,0,0)'">
    {{ i18n "skip_to_content" | default "跳到主内容" }}
  </a>

  {{ partial "nav.html" . }}

  <main class="main" id="main">
    {{ block "content" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  {{ block "scripts" . }}
  <script>
  (function() {
    var toggle = document.getElementById('nav-toggle');
    var mobile = document.getElementById('nav-mobile');
    if (toggle && mobile) {
      toggle.addEventListener('click', function() {
        var expanded = this.getAttribute('aria-expanded') === 'true';
        this.setAttribute('aria-expanded', !expanded);
        this.classList.toggle('active');
        mobile.classList.toggle('open');
      });
      document.addEventListener('click', function(e) {
        if (!toggle.contains(e.target) && !mobile.contains(e.target)) {
          toggle.setAttribute('aria-expanded', 'false');
          toggle.classList.remove('active');
          mobile.classList.remove('open');
        }
      });
    }
  })();
  </script>
  {{ end }}
</body>
</html>
