{{ define "content" }}
<div class="not-found">
  <div class="container">
    <div class="not-found-content">
      <h1 class="not-found-code">404</h1>
      <h2 class="not-found-title">页面未找到</h2>
      <p class="not-found-desc">抱歉，您访问的页面不存在或已被移动。</p>
      <div class="not-found-actions">
        <a class="btn btn-primary" href="{{ "/" | relURL }}">返回首页</a>
        <a class="btn btn-outline" href="{{ "/docs/" | relURL }}">查看文档</a>
      </div>
    </div>
  </div>
</div>
{{ end }}
