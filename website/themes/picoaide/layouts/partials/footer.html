<footer class="footer">
  <div class="footer-container container">
    <div class="footer-grid">
      <div class="footer-brand">
        <span class="footer-logo">{{ .Site.Title }}</span>
        <p class="footer-tagline">{{ .Site.Params.description }}</p>
      </div>

      {{ range .Site.Data.footer.columns }}
      <div class="footer-col">
        <h4 class="footer-col-title">{{ .title }}</h4>
        <ul class="footer-col-list">
          {{ range .links }}
          <li>
            <a href="{{ if .external }}{{ .href }}{{ else }}{{ .href | relURL }}{{ end }}"{{ if .external }} target="_blank" rel="noopener noreferrer"{{ end }}>{{ .label }}</a>
          </li>
          {{ end }}
        </ul>
      </div>
      {{ end }}
    </div>

    <div class="footer-bottom">
      <p class="footer-copyright">&copy; {{ now.Year }} {{ .Site.Title }}.</p>
      <p class="footer-version">{{ .Site.Params.version }}</p>
    </div>
  </div>
</footer>
