<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>PicoAide 管理后台</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <main id="login-page" class="login">
    <div class="login-card">
      <h2>PicoAide</h2>
      <p>管理后台</p>
      <div class="field">
        <label>服务器地址</label>
        <input type="text" id="login-server" placeholder="http://192.168.1.100:80">
      </div>
      <div class="row">
        <div class="field">
          <label>用户名</label>
          <input type="text" id="login-user">
        </div>
        <div class="field">
          <label>密码</label>
          <input type="password" id="login-pass">
        </div>
      </div>
      <div id="login-msg" class="msg"></div>
      <button class="btn btn-primary" id="login-btn" style="width:100%">登录</button>
    </div>
  </main>

  <div id="admin-layout" class="admin-layout hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">PicoAide</div>
      <nav class="sidebar-nav">
        <a href="#" data-section="dashboard" class="active">概览</a>
        <a href="#" data-section="users">用户管理</a>
        <a href="#" data-section="images">镜像管理</a>
        <a href="#" data-section="whitelist">白名单</a>
        <a href="#" data-section="skills">技能库</a>
        <a href="#" data-section="settings">系统配置</a>
      </nav>
      <div class="sidebar-footer">
        <span id="user-display"></span>
        <button class="btn btn-sm btn-outline" id="logout-btn">退出</button>
      </div>
    </aside>
    <main class="content">
      <div id="content-area"></div>
    </main>
  </div>

  <script src="../js/common.js"></script>
  <script src="admin.js" type="module"></script>
</body>
</html>
