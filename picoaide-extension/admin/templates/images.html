<h2>镜像管理</h2>

<h3>本地镜像</h3>
<div id="images-local-msg" class="msg"></div>
<table>
  <thead><tr><th>镜像标签</th><th>Image ID</th><th>大小</th><th>创建时间</th><th>依赖用户</th><th>操作</th></tr></thead>
  <tbody id="images-local"></tbody>
</table>
<p id="images-local-empty" class="text-muted text-center mt-1 hidden">暂无本地镜像</p>

<div class="row mb-1 mt-2" style="align-items:center">
  <h3 style="flex:1;margin:0">远程标签</h3>
  <button class="btn btn-outline btn-sm" id="images-refresh-registry">刷新</button>
</div>
<div id="images-registry-msg" class="msg"></div>
<table>
  <thead><tr><th>标签</th><th>状态</th><th>操作</th></tr></thead>
  <tbody id="images-registry"></tbody>
</table>
<p id="images-registry-empty" class="text-muted text-center mt-1 hidden">暂无远程标签</p>

<div id="image-pull-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">拉取镜像<button id="pull-modal-close">&times;</button></div>
    <div class="modal-body">
      <p id="pull-image-name" style="font-family:monospace;word-break:break-all"></p>
      <div id="pull-progress" style="background:#1a1a2e;border-radius:4px;padding:8px;max-height:300px;overflow-y:auto;font-family:monospace;font-size:12px;color:#aaa"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="pull-close-btn">关闭</button>
    </div>
  </div>
</div>

<div id="image-migrate-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">镜像迁移<button id="migrate-modal-close">&times;</button></div>
    <div class="modal-body">
      <p>以下用户正在使用此镜像：</p>
      <div id="migrate-users" style="margin:8px 0"></div>
      <div class="field">
        <label>迁移到目标镜像</label>
        <select id="migrate-target" style="width:100%;padding:6px 8px;border-radius:4px;border:1px solid #ccc"></select>
      </div>
      <div id="migrate-msg" class="msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="migrate-cancel-btn">取消</button>
      <button class="btn btn-primary" id="migrate-confirm-btn">迁移并删除旧镜像</button>
    </div>
  </div>
</div>

<div id="image-users-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">依赖用户<button id="image-users-close">&times;</button></div>
    <div class="modal-body">
      <p id="image-users-title" style="font-family:monospace;font-size:13px;word-break:break-all"></p>
      <div id="image-users-list" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="image-users-close-btn">关闭</button>
    </div>
  </div>
</div>

<div id="image-upgrade-modal" class="modal-overlay hidden">
  <div class="modal" style="max-width:640px">
    <div class="modal-header">升级镜像<button id="upgrade-modal-close">&times;</button></div>
    <div class="modal-body">
      <p>升级到：<strong id="upgrade-target" style="font-family:monospace"></strong></p>

      <div style="margin:10px 0">
        <label style="font-weight:bold">按分组升级：</label>
        <div id="upgrade-groups" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px"></div>
      </div>

      <div style="margin:10px 0">
        <div class="row" style="align-items:center;gap:8px;margin-bottom:6px">
          <label style="font-weight:bold">选择用户：</label>
          <button class="btn btn-sm btn-outline" id="upgrade-select-all">全选</button>
          <button class="btn btn-sm btn-outline" id="upgrade-deselect-all">取消全选</button>
        </div>
        <div id="upgrade-users" style="max-height:250px;overflow-y:auto;display:flex;flex-wrap:wrap;gap:4px"></div>
      </div>

      <div id="upgrade-progress" style="background:#1a1a2e;border-radius:4px;padding:8px;max-height:200px;overflow-y:auto;font-family:monospace;font-size:12px;color:#aaa;display:none"></div>
      <div id="upgrade-msg" class="msg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" id="upgrade-cancel-btn">取消</button>
      <button class="btn btn-primary" id="upgrade-confirm-btn">拉取并升级</button>
    </div>
  </div>
</div>
