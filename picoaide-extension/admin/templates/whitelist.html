<h2>白名单管理</h2>
<p class="text-sm text-muted">白名单为空时，所有用户均可使用。修改白名单后需手动运行 sync 同步。</p>
<div id="wl-section">
  <div id="wl-tags" class="mt-1"></div>
  <div id="wl-msg" class="msg"></div>
  <div class="row mt-1">
    <input type="text" id="wl-add-input" placeholder="输入用户名，多个用逗号分隔">
    <button class="btn btn-primary" id="wl-add-btn">添加</button>
  </div>
</div>
