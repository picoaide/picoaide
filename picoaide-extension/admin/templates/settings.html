<h2>系统配置</h2>
<p class="text-sm text-muted">编辑系统配置项</p>
<div id="settings-msg" class="msg"></div>

<div class="card">
  <div class="card-header">容器镜像</div>
  <div class="field"><label>镜像仓库</label>
    <select data-path="image.registry">
      <option value="github">GitHub (ghcr.io)</option>
      <option value="tencent">腾讯云 (hkccr.ccs.tencentyun.com)</option>
    </select>
  </div>
  <div class="field"><label>时区</label><input type="text" data-path="image.timezone" placeholder="Asia/Shanghai"></div>
</div>

<div class="card">
  <div class="card-header">目录配置</div>
  <div class="grid-2">
    <div class="field"><label>用户目录</label><input type="text" data-path="users_root" placeholder="./users"></div>
    <div class="field"><label>归档目录</label><input type="text" data-path="archive_root" placeholder="./archive"></div>
  </div>
</div>

<div class="card">
  <div class="card-header">Web 服务</div>
  <div class="field"><label>监听地址</label><input type="text" data-path="web.listen" placeholder=":80"></div>
  <div class="field"><label>启用 HTTPS</label>
    <select data-path="web.tls.enabled">
      <option value="false">关闭</option>
      <option value="true">开启</option>
    </select>
  </div>
  <div class="grid-2">
    <div class="field"><label>证书文件 (PEM)</label><input type="text" data-path="web.tls.cert_file" placeholder="/path/to/cert.pem"></div>
    <div class="field"><label>私钥文件 (PEM)</label><input type="text" data-path="web.tls.key_file" placeholder="/path/to/key.pem"></div>
  </div>
  <p class="text-sm text-muted">启用 HTTPS 后需重启服务生效。监听地址改为 :443 可自动启用 80→443 重定向。</p>
</div>

<div class="card">
  <div class="card-header">模型配置</div>
  <div class="grid-2">
    <div class="field">
      <label>默认模型</label>
      <select data-path="picoclaw.agents.defaults.model_name" id="default-model-select"></select>
    </div>
    <div class="field"><label>最大 Token</label><input type="number" data-path="picoclaw.agents.defaults.max_tokens" placeholder="32768"></div>
  </div>
  <div class="grid-2">
    <div class="field"><label>最大工具迭代次数</label><input type="number" data-path="picoclaw.agents.defaults.max_tool_iterations" placeholder="50"></div>
    <div class="field"></div>
  </div>
  <div id="model-list"></div>
  <button class="btn btn-primary btn-sm mt-1" id="add-model-btn">+ 添加模型</button>
</div>

<div class="card">
  <div class="card-header">网关</div>
  <div class="grid-2">
    <div class="field"><label>监听地址</label><input type="text" data-path="picoclaw.gateway.host" placeholder="0.0.0.0"></div>
    <div class="field"><label>端口</label><input type="number" data-path="picoclaw.gateway.port" placeholder="18790"></div>
  </div>
</div>

<div class="btn-group mt-2" style="justify-content:flex-end">
  <button class="btn btn-ghost" id="reset-btn">重置</button>
  <button class="btn btn-primary" id="save-btn">保存配置</button>
  <button class="btn btn-success" id="apply-all-btn">下发配置到全部用户</button>
</div>
