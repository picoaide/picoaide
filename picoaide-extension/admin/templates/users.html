<div class="row mb-1" style="align-items:center">
  <h2 style="flex:1;margin:0">用户管理</h2>
  <button class="btn btn-primary btn-sm hidden" id="new-user-btn">新建用户</button>
  <button class="btn btn-outline btn-sm" id="refresh-users">刷新</button>
</div>

<div id="unified-auth-tip" class="msg msg-info hidden">统一认证模式下，用户由外部认证系统管理，不支持手动添加。</div>

<table>
  <thead><tr><th>用户名</th><th>组</th><th>容器状态</th><th>镜像版本</th><th>IP</th><th>操作</th></tr></thead>
  <tbody id="users-tbody"></tbody>
</table>
<p id="users-empty" class="text-muted text-center mt-1 hidden">暂无用户</p>
<div id="users-msg" class="msg"></div>

<hr>

<div class="row mb-1" style="align-items:center">
  <h3 style="flex:1;margin:0">用户组</h3>
  <button class="btn btn-primary btn-sm" id="create-group-btn">新建组</button>
  <button class="btn btn-outline btn-sm" id="refresh-groups">刷新</button>
</div>
<table>
  <thead><tr><th>组名</th><th>来源</th><th>成员数</th><th>绑定技能</th><th>操作</th></tr></thead>
  <tbody id="groups-tbody"></tbody>
</table>
<p id="groups-empty" class="text-muted text-center mt-1 hidden">暂无用户组</p>
<div id="groups-msg" class="msg"></div>
