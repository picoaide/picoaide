<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="icons/icon48.png" alt="" class="logo">
      <div>
        <div class="title">PicoAide</div>
        <div class="subtitle">浏览器助手</div>
      </div>
    </div>

    <!-- 未登录 -->
    <div id="login-view">
      <p class="hint">登录 PicoAide 后，可以同步当前网页登录状态、授权 AI 控制当前标签页，或打开服务端管理后台。</p>
      <label>服务器地址</label>
      <input type="text" id="server-url" placeholder="http://192.168.1.100:80">
      <label>用户名</label>
      <input type="text" id="username" placeholder="普通用户">
      <label>密码</label>
      <input type="password" id="password" placeholder="登录密码">
      <div id="login-error" class="msg"></div>
      <button id="login-btn" class="action-btn">登录</button>
      <button id="open-admin-btn" class="action-btn secondary">打开管理后台</button>
    </div>

    <!-- 已登录 -->
    <div id="main-view" style="display:none">
      <div class="user-bar">
        <span id="user-display"></span>
        <button id="logout-btn" class="btn-logout">退出</button>
      </div>
      <p class="hint">插件仅保留同步网页登录状态、AI 浏览器控制和服务端后台入口。</p>
      <div id="status" class="status"></div>
      <button id="sync-btn" class="action-btn">同步登录状态给AI</button>
      <button id="cdp-btn" class="action-btn secondary">授权AI控制当前标签页</button>
      <button id="manage-btn" class="action-btn secondary">打开管理后台</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
