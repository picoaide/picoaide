name: Release

on:
  release:
    types: [published]

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare embed bundle
        run: |
          mkdir -p internal/rootfs/bundle
          # 占位 picoagent（build-server 会替换为实际的）
          touch internal/rootfs/bundle/picoagent
          # 下载真实 Alpine mini rootfs
          curl -fsSL "https://dl-cdn.alpinelinux.org/alpine/v3.21/releases/x86_64/alpine-minirootfs-3.21.0-x86_64.tar.gz" \
            -o internal/rootfs/bundle/alpine-rootfs.tar.gz

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Go tests
        run: go test ./internal/... -v -count=1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python tests
        run: |
          pip install pytest
          cd picoaide-desktop && python -m pytest tests/ -v

      - name: JS tests
        run: cd picoaide-extension && node --test tests/*.test.js

  build-server:
    needs: [test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build picoagent (${{ matrix.suffix }})
        env:
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          CGO_ENABLED=0 go build -o internal/rootfs/bundle/picoagent ./cmd/picoagent/

      - name: Build Alpine rootfs (${{ matrix.suffix }})
        run: |
          bash scripts/download-tools.sh "$(pwd)/internal/rootfs/bundle"

      - name: Build picoaide (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          ext=""
          [ "${GOOS}" = "windows" ] && ext=".exe"
          go build -ldflags "-X github.com/picoaide/picoaide/internal/config.Version=${version}" -o picoaide-${{ matrix.suffix }}${ext} ./cmd/picoaide/

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-bin-${{ matrix.suffix }}
          path: picoaide-${{ matrix.suffix }}*

  build-desktop:
    needs: [test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
          - os: macos-latest
            suffix: darwin-arm64
          - os: windows-latest
            suffix: windows-amd64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller -r picoaide-desktop/requirements.txt

      - name: Set version and build
        run: |
          sh scripts/set-desktop-version.sh "${GITHUB_REF_NAME#v}" picoaide-desktop
          cd picoaide-desktop && pyinstaller --onefile --name picoaide-desktop-${{ matrix.suffix }} main.py

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-desktop-${{ matrix.suffix }}
          path: |
            picoaide-desktop/dist/picoaide-desktop-${{ matrix.suffix }}*
            picoaide-desktop/dist/picoaide-desktop-${{ matrix.suffix }}*.exe

  release:
    needs: [build-server, build-desktop]
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts && sha256sum * > checksums.txt

      - name: Generate release body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 读取已有的 release body（用户手动编写的更新日志）
          existing=$(gh release view "${{ github.ref_name }}" --json body --jq '.body' 2>/dev/null || echo "")

          cat > body.md << 'BODY'
          ## 📥 下载指南

          ### 🖥 服务端 PicoAide
          | 文件 | 平台 | 说明 |
          |------|------|------|
          | \`picoaide-linux-amd64\` | Linux x86_64 | 服务器部署（推荐） |
          | \`picoaide-linux-arm64\` | Linux ARM64 | 树莓派、AWS Graviton 等 |

          ### 🖥 桌面客户端 PicoAide Desktop
          | 文件 | 平台 |
          |------|------|
          | \`picoaide-desktop-linux-amd64\` | Linux |
          | \`picoaide-desktop-darwin-arm64\` | macOS Apple Silicon |
          | \`picoaide-desktop-windows-amd64.exe\` | Windows |

          ### ✅ 完整性校验
          - \`checksums.txt\` — 所有文件的 SHA256 哈希值
          ```bash
          # 验证下载文件完整性
          sha256sum -c checksums.txt --ignore-missing
          ```

          ---

          BODY

          if [ -n "$existing" ]; then
            echo "$existing" >> body.md
          else
            echo "## 📋 更新内容" >> body.md
            echo "" >> body.md
            echo "（请手动编写更新日志）" >> body.md
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          body_path: body.md
