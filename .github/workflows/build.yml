name: Build PicoAide

on:
  push:
    paths-ignore:
      - 'docker/**'
      - 'docs/**'
      - '**.md'
  release:
    types: [published]
  workflow_dispatch:

jobs:
  # ============================================================
  # 单元测试
  # ============================================================
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      - name: Go tests
        run: go test ./internal/... -v -count=1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Python tests
        run: |
          pip install pytest
          cd picoaide-desktop && python -m pytest tests/ -v

      - name: JS tests
        run: cd picoaide-extension && node --test tests/*.test.js

  # ============================================================
  # Go 后端编译
  # ============================================================
  build-go:
    needs: [test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build picoaide (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="dev"
          if [ "${{ github.event_name }}" = "release" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          ext=""
          [ "${GOOS}" = "windows" ] && ext=".exe"
          go build -ldflags "-X github.com/picoaide/picoaide/internal/config.Version=${version}" -o picoaide-${{ matrix.suffix }}${ext} ./cmd/picoaide/

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-${{ matrix.suffix }}
          path: picoaide-${{ matrix.suffix }}*

  # ============================================================
  # 浏览器插件打包
  # ============================================================
  build-extension:
    needs: [test]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Package extension
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            sh scripts/package-extension.sh "${GITHUB_REF_NAME#v}" picoaide-extension.zip
          else
            cd picoaide-extension && zip -qr ../picoaide-extension.zip .
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-extension
          path: picoaide-extension.zip

  # ============================================================
  # 桌面客户端编译 (PyInstaller)
  # ============================================================
  build-desktop:
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-amd64
            build_cmd: |
              pip install -r picoaide-desktop/requirements.txt
              cd picoaide-desktop
              pyinstaller --onefile --name picoaide-desktop main.py
          - os: macos-latest
            suffix: darwin-arm64
            build_cmd: |
              pip install -r picoaide-desktop/requirements.txt
              cd picoaide-desktop
              pyinstaller --onefile --name picoaide-desktop main.py
          - os: windows-latest
            suffix: windows-amd64
            build_cmd: |
              pip install -r picoaide-desktop/requirements.txt
              cd picoaide-desktop
              pyinstaller --onefile --name picoaide-desktop main.py
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build desktop client
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            sh scripts/set-desktop-version.sh "${GITHUB_REF_NAME#v}" picoaide-desktop
          fi
          ${{ matrix.build_cmd }}
        env:
          CI: 1

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-desktop-${{ matrix.suffix }}
          path: |
            picoaide-desktop/dist/picoaide-desktop*
            picoaide-desktop/dist/picoaide-desktop*.exe

  # ============================================================
  # Release 发布
  # ============================================================
  release:
    if: github.event_name == 'release'
    needs: [test, build-go, build-extension, build-desktop]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/picoaide-linux-amd64/*
            artifacts/picoaide-linux-arm64/*
            artifacts/picoaide-darwin-amd64/*
            artifacts/picoaide-darwin-arm64/*
            artifacts/picoaide-windows-amd64/*
            artifacts/picoaide-extension/*
            artifacts/picoaide-desktop-linux-amd64/*
            artifacts/picoaide-desktop-darwin-arm64/*
            artifacts/picoaide-desktop-windows-amd64/*
