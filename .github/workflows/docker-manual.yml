name: Build Docker Image Manually

on:
  workflow_dispatch:
    inputs:
      picoclaw_version:
        description: '要编译的 PicoClaw 版本，例如 v0.2.6'
        required: true
        type: string
      image_repo:
        description: '镜像仓库名称'
        required: false
        default: 'picoaide/picoaide'
        type: choice
        options:
          - picoaide/picoaide
          - picoaide/picoaide-dev
      tags_mode:
        description: '标签策略'
        required: false
        default: 'version'
        type: choice
        options:
          - version
          - version-and-dev

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          VERSION="${{ inputs.picoclaw_version }}"
          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$'; then
            echo "Invalid PicoClaw version: $VERSION"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          VERSION="${{ inputs.picoclaw_version }}"
          IMAGE_REPO="${{ inputs.image_repo }}"

          if [ "${{ inputs.tags_mode }}" = "version-and-dev" ]; then
            TAGS="ghcr.io/${IMAGE_REPO}:${VERSION},ghcr.io/${IMAGE_REPO}:dev,hkccr.ccs.tencentyun.com/${IMAGE_REPO}:${VERSION},hkccr.ccs.tencentyun.com/${IMAGE_REPO}:dev"
          else
            TAGS="ghcr.io/${IMAGE_REPO}:${VERSION},hkccr.ccs.tencentyun.com/${IMAGE_REPO}:${VERSION}"
          fi

          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Building: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PICOCLAW_VERSION=${{ inputs.picoclaw_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
