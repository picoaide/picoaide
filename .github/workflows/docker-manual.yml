name: Build Docker Image Manually

on:
  workflow_dispatch:
    inputs:
      picoclaw_version:
        description: '要编译的 PicoClaw 版本，例如 v0.2.6'
        required: true
        type: string
      environment:
        description: '构建环境'
        required: false
        default: 'prod'
        type: choice
        options:
          - prod
          - dev

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate version format
        run: |
          VERSION="${{ inputs.picoclaw_version }}"
          if ! echo "$VERSION" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z]+)*$'; then
            echo "Invalid PicoClaw version: $VERSION"
            exit 1
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          VERSION="${{ inputs.picoclaw_version }}"

          if [ "${{ inputs.environment }}" = "dev" ]; then
            IMAGE_REPO="picoaide/picoaide-dev"
            TAGS="ghcr.io/${IMAGE_REPO}:${VERSION},ghcr.io/${IMAGE_REPO}:dev,hkccr.ccs.tencentyun.com/${IMAGE_REPO}:${VERSION},hkccr.ccs.tencentyun.com/${IMAGE_REPO}:dev"
          else
            IMAGE_REPO="picoaide/picoaide"
            TAGS="ghcr.io/${IMAGE_REPO}:${VERSION},hkccr.ccs.tencentyun.com/${IMAGE_REPO}:${VERSION}"
          fi

          echo "image_repo=${IMAGE_REPO}" >> $GITHUB_OUTPUT
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Building: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PICOCLAW_VERSION=${{ inputs.picoclaw_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
