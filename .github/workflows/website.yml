name: Website CI

on:
  push:
    paths:
      - 'website/**'
      - 'wrangler.toml'
      - 'internal/user/picoclaw_rules/**'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: '0.147.5'
          extended: true

      - name: Build website
        run: cd website && hugo --minify
