name: Build Docker Image

on:
  push:
    branches:
      - main
      - master
      - dev
  schedule:
    # 每天 UTC 03:00 执行（北京时间 11:00）
    - cron: '0 3 * * *'

jobs:
  prepare:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      image_repo: ${{ steps.plan.outputs.image_repo }}
      should_build: ${{ steps.plan.outputs.should_build }}
      full_rebuild: ${{ steps.plan.outputs.full_rebuild }}
      versions_json: ${{ steps.plan.outputs.versions_json }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get latest picoclaw version
        id: get_version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/sipeed/picoclaw/releases/latest | jq -r '.tag_name')
          if [ "$VERSION" = "null" ] || [ -z "$VERSION" ]; then
            echo "Failed to get version"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest picoclaw version: $VERSION"

      - name: Plan build
        id: plan
        run: |
          set -euo pipefail

          VERSION="${{ steps.get_version.outputs.version }}"
          SHORT_BRANCH="${{ github.ref_name }}"
          FULL_REBUILD=false
          SHOULD_BUILD=true
          IMAGE_REPO="picoaide/picoaide"

          if [ "$SHORT_BRANCH" = "dev" ]; then
            IMAGE_REPO="picoaide/picoaide-dev"
          fi

          list_image_tags() {
            local image_repo="$1"
            local token
            token=$(curl -fsSL "https://ghcr.io/token?service=ghcr.io&scope=repository:${image_repo}:pull" | jq -r '.token // empty' || true)
            if [ -z "$token" ]; then
              return 0
            fi
            curl -fsSL -H "Authorization: Bearer ${token}" "https://ghcr.io/v2/${image_repo}/tags/list" \
              | jq -r '.tags[]?' 2>/dev/null || true
          }

          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
            if [ -n "$BASE" ] && [ "$BASE" != "0000000000000000000000000000000000000000" ]; then
              CHANGED_FILES=$(git diff --name-only "$BASE" "${{ github.sha }}" || true)
            else
              CHANGED_FILES=$(git diff-tree --no-commit-id --name-only -r "${{ github.sha }}" || true)
            fi

            if echo "$CHANGED_FILES" | grep -q '^docker/'; then
              FULL_REBUILD=true
            fi
          fi

          if [ "${{ github.event_name }}" = "schedule" ]; then
            TAGS=$(list_image_tags "$IMAGE_REPO")

            if echo "$TAGS" | grep -Fxq "$VERSION"; then
              echo "Image with tag $VERSION already exists, skipping build"
              SHOULD_BUILD=false
            else
              echo "New version $VERSION detected, build needed"
              SHOULD_BUILD=true
            fi
          fi

          if [ "$FULL_REBUILD" = "true" ]; then
            VERSION_LIST=$(list_image_tags "$IMAGE_REPO" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | uniq || true)
            if [ -z "${VERSION_LIST:-}" ]; then
              VERSION_LIST="$VERSION"
            fi
            VERSIONS_JSON=$(printf '%s\n' "$VERSION_LIST" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          else
            VERSIONS_JSON=$(printf '%s\n' "$VERSION" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          fi

          echo "image_repo=$IMAGE_REPO" >> $GITHUB_OUTPUT
          echo "full_rebuild=$FULL_REBUILD" >> $GITHUB_OUTPUT
          echo "versions_json=$VERSIONS_JSON" >> $GITHUB_OUTPUT
          echo "should_build=$SHOULD_BUILD" >> $GITHUB_OUTPUT

  build:
    needs: prepare
    if: needs.prepare.outputs.should_build != 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 10
      matrix:
        version: ${{ fromJson(needs.prepare.outputs.versions_json) }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Tencent Container Registry
        uses: docker/login-action@v4.1.0
        with:
          registry: hkccr.ccs.tencentyun.com
          username: ${{ secrets.TENCENT_REGISTRY_USERNAME }}
          password: ${{ secrets.TENCENT_REGISTRY_PASSWORD }}

      - name: Generate image tags
        id: tags
        run: |
          VERSION="${{ matrix.version }}"
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          IMAGE_REPO="${{ needs.prepare.outputs.image_repo }}"

          if [ "${{ needs.prepare.outputs.full_rebuild }}" = "true" ]; then
            TAGS="ghcr.io/${IMAGE_REPO}:${VERSION},hkccr.ccs.tencentyun.com/${IMAGE_REPO}:${VERSION}"
          else
            if [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
              IMAGE="picoaide/picoaide"
              TAG="${VERSION}"
            else
              IMAGE="picoaide/picoaide-dev"
              TAG="dev-${SHORT_SHA}"
            fi

            TAGS="ghcr.io/${IMAGE}:${TAG},ghcr.io/${IMAGE}:dev,hkccr.ccs.tencentyun.com/${IMAGE}:${TAG},hkccr.ccs.tencentyun.com/${IMAGE}:dev"
          fi
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
          echo "Building: ${TAGS}"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.1.0
        with:
          context: ./docker
          file: ./docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            PICOCLAW_VERSION=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Buildx multi-arch 推送会产生 untagged sha256 manifest，GHCR 不会自动清理
      # 这里在每次构建后删除当前包名下所有 untagged 版本
      - name: Clean up untagged manifests
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ needs.prepare.outputs.image_repo }}
          delete-only-untagged-versions: true
