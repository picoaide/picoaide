name: Auto-approve

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize]

jobs:
  auto-approve:
    if: github.actor == 'lostmaniac'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Approve PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "Auto-approved for repo admin."
