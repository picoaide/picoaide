name: Auto-approve

on:
  pull_request_target:
    types: [opened, ready_for_review, reopened, synchronize]

jobs:
  auto-approve:
    if: github.actor == 'lostmaniac'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
