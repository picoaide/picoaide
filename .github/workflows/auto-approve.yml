name: Auto-approve

on:
  workflow_run:
    workflows: [Security Analysis]
    types: [completed]

jobs:
  auto-approve:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Approve PR for repo admin
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          COMMIT_SHA="${{ github.event.workflow_run.head_commit.id }}"
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR found for commit ${COMMIT_SHA}, skipping"
            exit 0
          fi
          PR_AUTHOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          if [ "$PR_AUTHOR" = "lostmaniac" ]; then
            gh pr review "$PR_NUMBER" --approve --body "Auto-approved for repo admin."
            echo "Approved PR #${PR_NUMBER}"
          else
            echo "PR author is ${PR_AUTHOR}, not admin, skipping"
          fi
