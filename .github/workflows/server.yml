name: Server CI

on:
  push:
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - 'Makefile'
      - 'config.yaml'
      - 'rules/**'
      - 'docker/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Format check
        run: bash format.sh --check
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Go tests
        run: go test ./internal/... -v -count=1

  build:
    needs: [test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build picoaide (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          [ "${GOOS}" = "windows" ] && ext=".exe"
          version="${GITHUB_REF_NAME#v}"
          [ -z "$version" ] && version="dev"
          go build -ldflags "-X github.com/picoaide/picoaide/internal/config.Version=${version}" -o picoaide-${{ matrix.suffix }}${ext} ./cmd/picoaide/

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-${{ matrix.suffix }}
          path: picoaide-${{ matrix.suffix }}*
