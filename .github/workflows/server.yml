name: Server CI

on:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.golangci.yml'
      - 'Makefile'
      - 'config.yaml'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare embed bundle
        run: |
          mkdir -p internal/rootfs/bundle
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o internal/rootfs/bundle/picoagent ./cmd/picoagent/
          bash scripts/download-tools.sh "$(pwd)/internal/rootfs/bundle"

      - name: Format check
        run: bash format.sh --check
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Go tests
        run: go test ./internal/... -v -count=1

  build:
    needs: [test]
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Prepare embed bundle
        run: |
          mkdir -p internal/rootfs/bundle
          CGO_ENABLED=0 GOOS=linux GOARCH=${{ matrix.goarch }} go build -o internal/rootfs/bundle/picoagent ./cmd/picoagent/
          bash scripts/download-tools.sh "$(pwd)/internal/rootfs/bundle"

      - name: Build picoaide (${{ matrix.suffix }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          [ -z "$version" ] && version="dev"
          go build -ldflags "-X github.com/picoaide/picoaide/internal/config.Version=${version}" -o picoaide-${{ matrix.suffix }} ./cmd/picoaide/

      - uses: actions/upload-artifact@v7
        with:
          name: picoaide-${{ matrix.suffix }}
          path: picoaide-${{ matrix.suffix }}*
