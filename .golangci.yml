version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gocritic
  settings:
    gocritic:
      enabled-checks:
        - dupImport
        - truncateCmp
        - unnamedResult

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
