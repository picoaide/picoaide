run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - gocritic

linters-settings:
  gocritic:
    enabled-checks:
      - dupImport
      - truncateCmp
      - unnamedResult

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 5
